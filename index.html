<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plynule — from tree to stool [stůl]</title>
<script>document.documentElement.classList.add('js');</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="styles-v2.css?v=20260606-empty-fix" />
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="js/characters.jsx"></script>
<script type="text/babel" src="js/props.jsx"></script>
<script type="text/babel" src="js/scenes-a.jsx"></script>
<script type="text/babel" src="js/scenes-b.jsx"></script>
<script type="text/babel" src="js/story.jsx"></script>
<script type="text/babel" src="js/feed.jsx?v=polaroids-process"></script>
<script type="text/babel" src="js/grain.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const IG = "https://www.instagram.com/plynule/";

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": [
    "#E0512F",
    "#FFFFFF"
  ],
  "paper": [
    "#FFFEFA",
    "#FAF6EE"
  ]
}/*EDITMODE-END*/;

function IgGlyph({ size = 16 }) {
  return (
    <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" strokeWidth="2" />
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" strokeWidth="2" />
      <circle cx="17.5" cy="6.5" r="1.4" fill="currentColor" />
    </svg>
  );
}
function Logo({ h = 40 }) {
  return (
    <span className="logo-video-wrap" style={{ '--logo-h': `${h}px` }}>
      <canvas className="logo-canvas" aria-hidden="true"></canvas>
      <video className="logo-video" autoPlay loop muted playsInline preload="auto" aria-hidden="true">
        <source src="assets/logo.webm" type="video/webm" />
      </video>
    </span>
  );
}

const MARQUEE = ['Handmade', 'Air-dried 4 years', 'No screws', 'One of one', 'Fine oils only', "Mates\u2019 rates"];
function Marquee({ lime = false }) {
  const group = (
    <span>
      {MARQUEE.map((w, i) => (<React.Fragment key={i}>{w}<span className="star"> ✶ </span></React.Fragment>))}
    </span>
  );
  return (
    <div className={'marquee' + (lime ? ' lime' : '')} aria-hidden="true">
      <div className="marquee-track"><span>{group}{group}</span></div>
    </div>
  );
}

// About text — used as a news-style crawling ticker
const ABOUT_TICKER_TEXT = "We\u2019re Ollie and Filip — friends who\u2019d been hanging out for years before realizing just how well our skills actually fit together. With technical know-how from engineering and woodworking, combined with a creative eye from design and filmmaking, we found the perfect balance to kick things off by building shelves. And honestly? It\u2019s brought us a lot of happiness along the way. When we finished that first shelf, it just clicked. After six months of admiring it (and feeling pretty pleased with ourselves), we decided to share that feeling with you. Now, we\u2019re here to offer you the chance to bring one of these unique pieces into your own home.";
function NewsTicker({ className = "" }) {
  // Duplicate content to create a seamless loop
  const content = (
    <span>
      {ABOUT_TICKER_TEXT} <span className="star">✶</span> {ABOUT_TICKER_TEXT}
    </span>
  );
  return (
    <div className={'marquee ' + className} aria-hidden="true">
      <div className="marquee-track"><span>{content}</span></div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', t.accent[0]);
    r.style.setProperty('--accent-ink', t.accent[1]);
    r.style.setProperty('--paper', t.paper[0]);
    r.style.setProperty('--paper2', t.paper[1]);
  }, [t.accent, t.paper]);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const renderLogo = (video) => {
      const wrap = video.closest('.logo-video-wrap');
      const canvas = wrap && wrap.querySelector('.logo-canvas');
      if (!canvas || video.dataset.chromaStarted === '1') return;
      video.dataset.chromaStarted = '1';

      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      let raf = 0;

      const sizeCanvas = () => {
        if (!video.videoWidth || !video.videoHeight) return false;
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        return true;
      };

      const draw = () => {
        if (sizeCanvas() && video.readyState >= 2) {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = frame.data;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i + 1], b = data[i + 2];
            if (r > 230 && g > 230 && b > 230) {
              data[i + 3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        raf = requestAnimationFrame(draw);
      };

      video.addEventListener('loadedmetadata', sizeCanvas, { once: true });
      draw();
    };

    const playLogos = () => {
      document.querySelectorAll('.logo-video').forEach(video => {
        video.muted = true;
        video.play().catch(() => {});
        renderLogo(video);
      });
    };
    const raf = requestAnimationFrame(playLogos);
    const tid = setTimeout(playLogos, 250);
    return () => {
      cancelAnimationFrame(raf);
      clearTimeout(tid);
    };
  }, [menuOpen]);

  useEffect(() => {
    document.body.classList.toggle('menu-open', menuOpen);
    return () => document.body.classList.remove('menu-open');
  }, [menuOpen]);

  useEffect(() => {
    const headlineSelectors = '.display, .cta-display, .secnum .l, .pl-readout h3, .maker .mname, .makers-lead, .pl-post-cap, .menu-links a, .marquee-track';
    const brandLetters = /[plynue]/i;

    function wrapBrandLetters(el) {
      if (!el || el.dataset.brandWrapped === '1') return;
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const parent = node.parentNode;
          if (parent && parent.classList && parent.classList.contains('brand-letter')) {
            return NodeFilter.FILTER_REJECT;
          }
          if (parent && parent.closest && parent.closest('.translation')) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) nodes.push(node);

      nodes.forEach(textNode => {
        const text = textNode.nodeValue;
        if (!brandLetters.test(text)) return;
        const frag = document.createDocumentFragment();
        for (const ch of text) {
          if (brandLetters.test(ch)) {
            const span = document.createElement('span');
            span.className = 'brand-letter';
            span.textContent = ch;
            frag.appendChild(span);
          } else {
            frag.appendChild(document.createTextNode(ch));
          }
        }
        textNode.parentNode.replaceChild(frag, textNode);
      });
      el.dataset.brandWrapped = '1';
    }

    const wrapAll = () => document.querySelectorAll(headlineSelectors).forEach(wrapBrandLetters);
    const tid = setTimeout(wrapAll, 0);
    const readout = document.querySelector('.pl-readout');
    let observer;

    if (readout && 'MutationObserver' in window) {
      observer = new MutationObserver(() => {
        observer.disconnect();
        const title = readout.querySelector('h3');
        if (title) {
          delete title.dataset.brandWrapped;
          wrapBrandLetters(title);
        }
        observer.observe(readout, { childList: true, subtree: true, characterData: true });
      });
      observer.observe(readout, { childList: true, subtree: true, characterData: true });
    }

    return () => {
      clearTimeout(tid);
      observer && observer.disconnect();
    };
  }, []);

  useEffect(() => {
    const els = Array.from(document.querySelectorAll('.reveal, .line-mask'));
    const reveal = (el) => el.classList.add('in');
    let io;
    if ('IntersectionObserver' in window) {
      io = new IntersectionObserver((ents) => {
        ents.forEach(e => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
      els.forEach(el => io.observe(el));
    }
    const revealVisible = () => {
      els.forEach(el => {
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight * 0.95) reveal(el);
      });
    };
    const raf = requestAnimationFrame(revealVisible);
    const safety = setTimeout(() => els.forEach(el => el.classList.add('force-show')), 1600);
    return () => { io && io.disconnect(); cancelAnimationFrame(raf); clearTimeout(safety); };
  }, []);

  const menuItems = [
    { label: "Let's talk", href: '#contact', kicker: '01' },
  ];

  return (
    <React.Fragment>
      <GrainBackdrop />
      {/* NAV */}
      <nav className={'nav' + (scrolled ? ' scrolled' : '')}>
        <a href="#top" className="nav-logo" aria-label="Plynule home" onClick={() => setMenuOpen(false)}><Logo h={52} /></a>
        <button
          className={'doorbtn' + (menuOpen ? ' is-open' : '')}
          type="button"
          aria-label="Toggle navigation"
          aria-expanded={menuOpen}
          aria-pressed={menuOpen}
          onClick={() => setMenuOpen(v => !v)}
        >
          <span className="door-scene">
            <span className="door-panel"><span className="door-x"></span></span>
            <span className="door-leaf"><span className="door-dot"></span></span>
          </span>
        </button>
      </nav>

      <div className={'menu-panel' + (menuOpen ? ' is-open' : '')} aria-hidden={!menuOpen}>
        <div className="menu-panel-inner">
          <div className="menu-grid">
            <div className="menu-brand">
              <Logo h={92} />
              <p>Furniture from patience, jokes, and wood that took its time.</p>
            </div>
            <div className="menu-links">
              {menuItems.map(item => (
                <a key={item.href} href={item.href} onClick={() => setMenuOpen(false)}>
                  <span>{item.kicker}</span>
                  {item.label}
                </a>
              ))}
            </div>
          </div>
          <div className="menu-bottom">
            <span className="kick">Plynule · smoothly, without interruption</span>
            <a href={IG} target="_blank" rel="noopener" onClick={() => setMenuOpen(false)}><IgGlyph /> @plynule</a>
          </div>
        </div>
      </div>

      {/* HERO */}
      <header className="hero wrap" id="top" data-screen-label="Hero">
        <h1 className="display hero-display">
          <span className="line-mask"><span>From tree</span></span>
          <span className="line-mask" style={{ '--i': 1 }}><span>to stool <span className="translation">[:stůl]</span></span></span>
        </h1>
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 20 }}>
          <p className="hero-sub reveal" style={{ '--i': 2 }}>We’re Duo Plynule. We start with the tree, make a lot of sawdust, have fun, sand a lot, and stay with each piece until the top coat of oil.</p>
        </div>

        <div className="reveal"><PolaroidStrip /></div>

        <section className="custom-morph reveal" aria-label="Custom furniture">
          <div className="custom-copy">
            <span className="kick">Custom things, our way</span>
            <h2 className="custom-title">Our idea. Or yours.</h2>
            <p>
              We make things we dream up along the way, and things you bring to us.
              Custom pieces that start as a sentence over coffee and end up as something real.
            </p>
          </div>
          <div className="morph-box" aria-hidden="true">
            <div className="morph-frame">
              <iframe
                title="Morphing furniture sketch"
                src="assets/furniture-morph-embed.html"
                loading="lazy"
              ></iframe>
            </div>
          </div>
        </section>

      </header>

      {/* CONTACT — 01 */}
      <section className="section dark" id="contact" data-screen-label="Contact">
        <div className="wrap">
          <div className="secnum reveal">
            <span className="n">01</span>
            <span className="l">Let's talk</span>
            <span className="note">Tell us what you're after and which corner of the room it's for.</span>
          </div>
          <h2 className="cta-display reveal">Want one?<br /><span className="acc">Let's talk.</span></h2>
          <div className="cta-row reveal">
            <a className="btn accent" href="mailto:hello@plynule.com">Start a commission</a>
            <a className="btn ghost" href={IG} target="_blank" rel="noopener"><IgGlyph /> DM us on Instagram</a>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="foot">
        <div className="foot-grid">
          <div className="foot-brand">
            <Logo h={42} />
            <p><strong>plynule</strong> <span className="hand">(adv.)</span> smoothly, fluently, without interruption.</p>
          </div>
          <div className="foot-contact" aria-label="Contact links">
            <a href={IG} target="_blank" rel="noopener"><span>Instagram</span><span>@plynule</span></a>
            <a href="mailto:hello@plynule.com"><span>Email</span><span>hello@plynule.com</span></a>
            <a href="https://www.linkedin.com/company/plynule/" target="_blank" rel="noopener"><span>LinkedIn</span><span>Plynule</span></a>
          </div>
          <div className="foot-bottom">
            <span>© {new Date().getFullYear()} Plynule</span>
            <span>Praha, CZ</span>
          </div>
        </div>
      </footer>

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Look" />
        <TweakColor label="Accent" value={t.accent}
          options={[['#E0512F', '#FFFFFF'], ['#C8F23E', '#15110B'], ['#2E6BFF', '#FFFFFF'], ['#FF5DA2', '#15110B']]}
          onChange={(v) => setTweak('accent', v)} />
        <TweakColor label="Paper tone" value={t.paper}
          options={[['#ECE4D2', '#E4D9C0'], ['#EFEAE0', '#E5DDCC'], ['#E9E7DA', '#DCD9C6'], ['#F2ECE0', '#E8DECB']]}
          onChange={(v) => setTweak('paper', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
