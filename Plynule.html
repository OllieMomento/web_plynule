<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plynule — furniture, made slowly</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Caveat:wght@600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="js/characters.jsx"></script>
<script type="text/babel" src="js/props.jsx"></script>
<script type="text/babel" src="js/scenes-a.jsx"></script>
<script type="text/babel" src="js/scenes-b.jsx"></script>
<script type="text/babel" src="js/story.jsx"></script>
<script type="text/babel" src="js/feed.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const IG = "https://www.instagram.com/plynule/";

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#DD5A33",
  "paper": ["#F2E9D7", "#EADFC6"],
  "speed": 1,
  "columns": "3",
  "headline": "Two friends, one tree, four years of patience."
}/*EDITMODE-END*/;

function IgGlyph({ size = 18 }) {
  return (
    <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" strokeWidth="2" />
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" strokeWidth="2" />
      <circle cx="17.5" cy="6.5" r="1.4" fill="currentColor" />
    </svg>
  );
}

function Logo({ h = 42 }) {
  return <video src="assets/PlynuleLogo.mp4" autoPlay muted loop playsInline style={{ height: h }} />;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', t.accent);
    r.style.setProperty('--paper', t.paper[0]);
    r.style.setProperty('--paper2', t.paper[1]);
  }, [t.accent, t.paper]);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const pace = 1 / t.speed;
  const cols = Number(t.columns);

  const values = [
    ['01', 'Slow on purpose', 'Air-dried for years, never kiln-rushed in weeks.'],
    ['02', 'Joinery, not hardware', 'Mortise and tenon first. Screws are a last resort.'],
    ['03', 'One of one', 'Every piece is a little different. So are we.'],
    ['04', 'Fine oils only', 'Food-safe hard-wax finishes that age well.'],
  ];

  return (
    <React.Fragment>
      {/* NAV */}
      <nav className={'nav' + (scrolled ? ' scrolled' : '')}>
        <a href="#top" className="nav-logo" aria-label="Plynule home"><Logo h={42} /></a>
        <div className="nav-links">
          <a href="#story">The story</a>
          <a href="#feed">Workshop feed</a>
          <a href="#about">About</a>
          <a className="btn accent" href={IG} target="_blank" rel="noopener"><IgGlyph /> Follow</a>
        </div>
      </nav>

      {/* HERO */}
      <header className="hero wrap" id="top" data-screen-label="Hero">
        <div className="hero-head">
          <span className="kicker">handmade, eventually</span>
          <h1>{t.headline}</h1>
          <p className="hero-sub">Plynule is a two-person furniture workshop. We start with a standing tree and stop fussing somewhere around the third coat of oil. Here's the whole, slightly ridiculous story — start to finish.</p>
        </div>
        <section id="story" data-screen-label="Story player">
          <Story pace={pace} accent={t.accent} />
        </section>
      </header>

      {/* FEED */}
      <section className="section alt" id="feed" data-screen-label="Feed">
        <div className="wrap">
          <div className="sec-head">
            <div>
              <div className="feed-handle"><IgGlyph size={22} /> @plynule</div>
              <div className="feed-live" style={{ marginTop: 8 }}><span className="dot"></span> Fresh from the bench — updated as we post</div>
            </div>
            <a className="btn ghost" href={IG} target="_blank" rel="noopener">See it all on Instagram</a>
          </div>
          <Feed columns={cols} />
          <p className="hand" style={{ textAlign: 'center', marginTop: 18, fontSize: 20, color: 'var(--ink-soft)' }}>drag your own photos onto any frame ✦ they stick</p>
        </div>
      </section>

      {/* ABOUT */}
      <section className="section about" id="about" data-screen-label="About">
        <div className="wrap about-grid">
          <div>
            <span className="kicker">who's "we", anyway</span>
            <p className="about-lead">Two friends who liked wood a normal amount, then accidentally <em>way too much</em>.</p>
            <p>It started with one tree and a borrowed saw. The plan was a single coffee table. Four years of drying later — and a workshop slowly taken over by clamps — we make a handful of pieces a year, each one from timber we know by name. No factory, no flat-pack, no rush.</p>
          </div>
          <div className="values">
            {values.map(v => (
              <div className="value" key={v[0]}>
                <b>{v[0]}</b>
                <div><div className="vt">{v[1]}</div><div className="vd">{v[2]}</div></div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CONTACT */}
      <section className="section" id="contact" data-screen-label="Contact">
        <div className="wrap">
          <div className="cta">
            <span className="kicker" style={{ color: 'var(--accent)' }}>commissions, slowly</span>
            <h2>Want one? <em>Let's talk.</em></h2>
            <p>Tell us roughly what you're after and which corner of the room it's for. We'll talk timber, timelines, and (whisper it) mates' rates.</p>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              <a className="btn" href="mailto:hello@plynule.com">Start a commission</a>
              <a className="btn ghost" style={{ background: 'transparent', color: 'var(--paper)', borderColor: 'var(--paper)' }} href={IG} target="_blank" rel="noopener"><IgGlyph /> DM us on Instagram</a>
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="foot wrap">
        <Logo h={30} />
        <span><b>plynule</b> <span className="hand" style={{ fontSize: 18 }}>(adv.)</span> — smoothly, fluently, without interruption.</span>
        <a href={IG} target="_blank" rel="noopener" style={{ textDecoration: 'none', display: 'inline-flex', gap: 6, alignItems: 'center' }}><IgGlyph /> @plynule</a>
        <span>© {new Date().getFullYear()} Plynule</span>
      </footer>

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Look" />
        <TweakColor label="Accent" value={t.accent}
          options={['#DD5A33', '#C2452E', '#3E7C77', '#6E8C4E', '#B5862A']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakColor label="Paper tone" value={t.paper}
          options={[['#F2E9D7', '#EADFC6'], ['#EDE6D6', '#E3DAC4'], ['#E7E8D9', '#DBDDC7'], ['#F4EFE6', '#E9E2D2']]}
          onChange={(v) => setTweak('paper', v)} />
        <TweakSection label="Story" />
        <TweakSlider label="Animation speed" value={t.speed} min={0.6} max={1.8} step={0.1} unit="×"
          onChange={(v) => setTweak('speed', v)} />
        <TweakText label="Headline" value={t.headline}
          onChange={(v) => setTweak('headline', v)} />
        <TweakSection label="Feed" />
        <TweakRadio label="Columns" value={t.columns} options={['2', '3', '4']}
          onChange={(v) => setTweak('columns', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
